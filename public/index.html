<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orion Shop</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="stylesheet" href="style.css">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #0f0f1a;
            margin: 0;
            padding: 0;
            color: #fff;
        }

        header {
            background: linear-gradient(135deg, #1e1e38 0%, #111125 100%);
            color: white;
            padding: 2.5rem;
            text-align: center;
            position: relative;
            border-bottom: 3px solid #3498db;
        }

        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #111125;
        }

        ::-webkit-scrollbar-thumb {
            background: #00b4db;
            border-radius: 5px;
        }

        .antet-butoane {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            gap: 15px;
        }

        .cos-buton, .user-buton {
            background: linear-gradient(135deg, #00b4db 0%, #0083b0 100%);
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 4px 15px rgba(0, 180, 219, 0.4);
        }

        .cos-contor {
            background: white;
            color: #0083b0;
            padding: 3px 10px;
            border-radius: 50%;
            font-weight: 900;
        }

        .panou-lateral {
            position: fixed;
            top: 0;
            width: 340px;
            height: 100%;
            background: #16162a;
            box-shadow: 5px 0 25px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
            z-index: 1000;
            padding: 25px;
            display: flex;
            flex-direction: column;
        }

        #cos-panou {
            left: -400px;
            border-right: 2px solid #00b4db;
        }

            #cos-panou.deschis {
                left: 0;
            }

        #user-panou {
            right: -400px;
            border-left: 2px solid #00b4db;
        }

            #user-panou.deschis {
                right: 0;
            }

        .panou-antet {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #252542;
            padding-bottom: 15px;
            margin-bottom: 15px;
        }

        .inchide-panou {
            background: #ff4757;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .comutator-mod {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            background: #111125;
            padding: 5px;
            border-radius: 8px;
        }

            .comutator-mod button {
                flex: 1;
                background: transparent;
                color: #8a8aab;
                border: none;
                padding: 8px;
                cursor: pointer;
                font-weight: bold;
            }

                .comutator-mod button.activ {
                    background: #00b4db;
                    color: white;
                    border-radius: 6px;
                }

        .formular-orion {
            background: #1e1e38;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #2d2d4f;
        }

        .grup-input {
            margin-bottom: 12px;
        }

            .grup-input label {
                display: block;
                font-size: 0.8rem;
                color: #8a8aab;
                margin-bottom: 4px;
            }

            .grup-input input, .grup-input textarea, .grup-input select {
                width: 100%;
                background: #111125;
                border: 1px solid #2d2d4f;
                padding: 10px;
                border-radius: 8px;
                color: white;
            }

        .btn-actiune {
            background: linear-gradient(135deg, #00b4db 0%, #0083b0 100%);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }

        .buton-plata-sus {
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            border-bottom: 4px solid #1e7e43;
        }

        .cos-total {
            font-size: 1.3rem;
            font-weight: bold;
            padding: 10px 0;
            border-bottom: 2px solid #252542;
            display: flex;
            justify-content: space-between;
            color: #2ecc71;
        }

        .cos-elemente {
            flex: 1;
            overflow-y: auto;
        }

        .produs-cos {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #252542;
        }

        .sterge-produs {
            background: none;
            color: #ff4757;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
        }

        .container {
            max-width: 1200px;
            margin: 3rem auto;
            padding: 0 1rem;
        }

        .lista-produse {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 2.5rem;
        }

        /* CARD MODIFICAT PENTRU CLICK PE DETALII */
        .card {
            background: #1e1e38;
            padding: 1.8rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            justify-content: space-between;
            border: 1px solid #2d2d4f;
            transition: transform 0.3s;
        }

            .card:hover {
                transform: translateY(-5px);
                border-color: #00b4db;
            }

        .produs-img {
            width: 100%;
            height: 200px;
            border-radius: 15px;
            object-fit: contain;
            margin-bottom: 1.2rem;
            background-color: #111125;
            cursor: pointer;
        }

        .card h3 {
            margin: 0.5rem 0;
            font-size: 1.3rem;
            cursor: pointer;
        }

            .card h3:hover {
                color: #00b4db;
            }

        .pret {
            font-size: 1.5rem;
            color: #00b4db;
            font-weight: bold;
            margin-bottom: 1.2rem;
        }

        .btn-cumpara {
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
            color: white;
            border: none;
            padding: 12px 0;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            border-bottom: 3px solid #1f6594;
        }

        /* STILURILE PENTRU MODALUL DETALII (ZONA DESENATĂ DE TINE) */
        .modal-fundal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 15px;
        }

        .modal-continut {
            background: #16162a;
            width: 100%;
            max-width: 850px;
            border-radius: 20px;
            border: 2px solid #00b4db;
            padding: 30px;
            position: relative;
            box-shadow: 0 0 30px rgba(0,180,219,0.3);
        }

        .inchide-modal {
            position: absolute;
            top: 15px;
            right: 20px;
            background: none;
            border: none;
            color: #ff4757;
            font-size: 1.8rem;
            cursor: pointer;
            font-weight: bold;
        }

        /* Layout-ul Orizontal exact ca în desen */
        .detalii-layout {
            display: flex;
            gap: 30px;
            align-items: flex-start;
        }

        .detalii-stanga {
            flex: 1;
            text-align: center;
            background: #111125;
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #2d2d4f;
        }

            .detalii-stanga img {
                max-width: 100%;
                max-height: 250px;
                object-fit: contain;
            }

        .detalii-dreapta {
            flex: 1.5;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .detalii-nume {
            font-size: 1.8rem;
            margin: 0;
            color: #fff;
        }

        .detalii-pret {
            font-size: 1.6rem;
            color: #2ecc71;
            font-weight: bold;
        }

        .detalii-rating-mediu {
            font-size: 1.1rem;
            color: #f1c40f;
            font-weight: bold;
        }

        /* Secțiunea Comentarii */
        .sectiune-comentarii {
            margin-top: 20px;
            border-top: 1px solid #252542;
            padding-top: 20px;
        }

        .lista-comentarii {
            max-height: 180px;
            overflow-y: auto;
            background: #111125;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            border: 1px solid #2d2d4f;
        }

        .comentariu-item {
            border-bottom: 1px solid #252542;
            padding: 10px 0;
            font-size: 0.95rem;
        }

            .comentariu-item:last-child {
                border-bottom: none;
            }

        .comentariu-user {
            color: #00b4db;
            font-weight: bold;
        }

        .comentariu-stele {
            color: #f1c40f;
            margin-left: 10px;
        }

        .notificare {
            position: fixed;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            color: white;
            padding: 16px 32px;
            border-radius: 12px;
            font-weight: bold;
            z-index: 3000;
            transition: top 0.5s;
        }

            .notificare.afisat {
                top: 30px;
            }

            .notificare.eroare {
                background: linear-gradient(135deg, #ff4757 0%, #ee5253 100%);
            }

        @media (max-width: 768px) {
            .detalii-layout {
                flex-direction: column;
            }

            header {
                padding: 5rem 1rem 1.5rem 1rem;
            }

            .antet-butoane {
                position: fixed;
                top: 12px;
                left: 12px;
                width: calc(100% - 24px);
                justify-content: space-between;
                z-index: 999;
            }
        }
    </style>
</head>
<body>

    <div id="zona-notificare" class="notificare">Acțiune reușită!</div>

    <header>
        <div class="antet-butoane">
            <button class="cos-buton" onclick="toggleCart()">Coș <span id="cos-contor" class="cos-contor">0</span></button>
            <button class="user-buton" id="btn-meniu-user" onclick="toggleUserMenu()">Contul meu</button>
        </div>
        <h1>Orion Shop</h1>
        <p style="color: #8a8aab; margin: 5px 0 0 0;">Magazinul Orion făcut de Octavian</p>
    </header>

    <div id="produs-modal" class="modal-fundal">
        <div class="modal-continut">
            <button class="inchide-modal" onclick="closeProductModal()">X</button>

            <div class="detalii-layout">
                <div class="detalii-stanga">
                    <img id="modal-img" src="" alt="">
                </div>

                <div class="detalii-dreapta">
                    <h2 id="modal-nume" class="detalii-nume">Nume Produs</h2>
                    <div id="modal-pret" class="detalii-pret">0.00 RON</div>
                    <div id="modal-rating-mediu" class="detalii-rating-mediu">⭐⭐⭐⭐⭐ (5.0)</div>
                    <p id="modal-descriere" style="color: #8a8aab; margin: 0;"></p>

                    <button id="modal-btn-adauga" class="btn-cumpara" style="font-size: 1.1rem; padding: 15px 0;">Adaugă în coș</button>
                </div>
            </div>

            <div class="sectiune-comentarii">
                <h3>Recenzii și Comentarii</h3>
                <div id="modal-lista-comentarii" class="lista-comentarii"></div>

                <div class="formular-orion" style="background: #111125;">
                    <h4 style="margin: 0 0 10px 0; color: #00b4db;">Adaugă recenzia ta:</h4>
                    <div style="display: flex; gap: 15px; margin-bottom: 10px;">
                        <div class="grup-input" style="flex: 1; margin: 0;">
                            <label>Rating (Stele)</label>
                            <select id="nou-comentariu-rating">
                                <option value="5">⭐⭐⭐⭐⭐ (5 Stele)</option>
                                <option value="4">⭐⭐⭐⭐ (4 Stele)</option>
                                <option value="3">⭐⭐⭐ (3 Stele)</option>
                                <option value="2">⭐⭐ (2 Stele)</option>
                                <option value="1">⭐ (1 Stea)</option>
                            </select>
                        </div>
                        <div class="grup-input" style="flex: 3; margin: 0;">
                            <label>Comentariul tău</label>
                            <input type="text" id="nou-comentariu-text" placeholder="Ex: acest produs a fost foarte bun...">
                        </div>
                    </div>
                    <button class="btn-actiune" onclick="submitNewComment()">Trimite Comentariul</button>
                </div>
            </div>
        </div>
    </div>

    <div id="cos-panou" class="panou-lateral">
        <div class="panou-antet">
            <h2>Coșul tău</h2>
            <button class="inchide-panou" onclick="toggleCart()">X</button>
        </div>
        <button class="buton-plata-sus" onclick="sendOrderToServer()">Finalizează Comanda</button>
        <div class="cos-total"><span>Total:</span><span id="cos-total-pret">0.00 RON</span></div>
        <div id="cos-elemente" class="cos-elemente"><p style="color: #6a6a8a; text-align: center;">Coșul este gol.</p></div>
    </div>

    <div id="user-panou" class="panou-lateral">
        <div class="panou-antet">
            <h2 id="user-titlu-panou">Autentificare</h2>
            <button class="inchide-panou" onclick="toggleUserMenu()">X</button>
        </div>
        <div id="sectiune-vizitator">
            <div class="comutator-mod">
                <button id="btn-mod-login" class="activ" onclick="switchUserMode('login')">Sign In</button>
                <button id="btn-mod-register" onclick="switchUserMode('register')">Sign Up</button>
            </div>
            <div class="formular-orion">
                <div class="grup-input"><label>User</label><input type="text" id="auth-username" placeholder="Ex: Octavian363"></div>
                <div class="grup-input"><label>Password</label><input type="password" id="auth-password" placeholder="••••••••"></div>
                <div class="grup-input" id="grup-input-adresa" style="display: none;"><label>Adresă Livrare</label><input type="text" id="auth-address" placeholder="Oraș, Stradă"></div>
                <button class="btn-actiune" id="btn-auth-trimite" onclick="executeAuthentication()">Sign In</button>
            </div>
        </div>
        <div id="sectiune-conectat" style="display: none;">
            <div class="info-status-conectat">
                <h3 style="color: #2ecc71; margin-top: 0;">Cont Conectat</h3>
                <p id="info-user-salut" style="font-weight: bold;"></p>
                <p id="info-user-adresa" style="color: #8a8aab;"></p>
                <button class="btn-deconectare" onclick="signOutUser()">Sign Out</button>
            </div>
        </div>
    </div>

    <div class="container">
        <div id="lista-produse" class="lista-produse">Se încarcă catalogul...</div>
    </div>

    <script>
        const BACKEND_URL = "";
        let cart = [];
        let products = [];
        let currentAuthMode = 'login';
        let loggedInUser = null;
        let activeModalProductId = null;

        function toggleCart() { document.getElementById('cos-panou').classList.toggle('deschis'); document.getElementById('user-panou').classList.remove('deschis'); }
        function toggleUserMenu() { document.getElementById('user-panou').classList.toggle('deschis'); document.getElementById('cos-panou').classList.remove('deschis'); }

        function switchUserMode(mode) {
        currentAuthMode = mode;
        const btnLogin = document.getElementById('btn-mod-login');
        const btnRegister = document.getElementById('btn-mod-register');
        const addressGroup = document.getElementById('grup-input-adresa');
        const btnSubmit = document.getElementById('btn-auth-trimite');
        if (mode === 'login') { btnLogin.classList.add('activ'); btnRegister.classList.remove('activ'); addressGroup.style.display = 'none'; btnSubmit.innerText = 'Sign In'; }
        else { btnRegister.classList.add('activ'); btnLogin.classList.remove('activ'); addressGroup.style.display = 'block'; btnSubmit.innerText = 'Sign Up'; }
        }

        function showNotification(message, isError = false) {
        const el = document.getElementById('zona-notificare'); el.innerText = message;
        if (isError) el.classList.add('eroare'); else el.classList.remove('eroare');
        el.classList.add('afisat'); setTimeout(() => { el.classList.remove('afisat'); }, 4000);
        }

        function checkLoginState() { const stored = localStorage.getItem('orion_user_session'); if (stored) { loggedInUser = JSON.parse(stored); updateUserInterface(); } }
        function updateUserInterface() {
        const secVisitor = document.getElementById('sectiune-vizitator'); const secConnected = document.getElementById('sectiune-conectat'); const btnMenu = document.getElementById('btn-meniu-user');
        if (loggedInUser) { secVisitor.style.display = 'none'; secConnected.style.display = 'block'; btnMenu.innerText = `${loggedInUser.username}`; document.getElementById('info-user-salut').innerText = `Salut, ${loggedInUser.username}!`; document.getElementById('info-user-adresa').innerText = `Adresă: ${loggedInUser.address}`; }
        else { secVisitor.style.display = 'block'; secConnected.style.display = 'none'; btnMenu.innerText = 'Contul meu'; }
        }

        async function executeAuthentication() {
        const username = document.getElementById('auth-username').value.trim(); const password = document.getElementById('auth-password').value.trim(); const address = document.getElementById('auth-address').value.trim();
        if (!username || !password) { showNotification("Introdu userul și parola!", true); return; }
        if (currentAuthMode === 'register' && !address) { showNotification("Adaugă o adresă!", true); return; }
        const route = currentAuthMode === 'login' ? '/api/login' : '/api/register';
        try {
        const response = await fetch(BACKEND_URL + route, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password, address }) });
        const data = await response.json();
        if (data.success) {
        showNotification(data.message);
        if (currentAuthMode === 'login') { loggedInUser = data.user; localStorage.setItem('orion_user_session', JSON.stringify(data.user)); updateUserInterface(); toggleUserMenu(); }
        else { switchUserMode('login'); }
        } else { showNotification(data.message, true); }
        } catch (e) { showNotification("Eroare de conexiune.", true); }
        }

        function signOutUser() { loggedInUser = null; localStorage.removeItem('orion_user_session'); updateUserInterface(); showNotification("Te-ai deconectat!"); }

        async function fetchProducts() {
        try {
        const response = await fetch(BACKEND_URL + "/api/produse");
        products = await response.json();
        const container = document.getElementById('lista-produse'); container.innerHTML = "";
        products.forEach(p => {
        container.innerHTML += `
        <div class="card">
        <img src="${p.image}" class="produs-img" alt="${p.name}" onclick="openProductModal(${p.id})">
        <h3 onclick="openProductModal(${p.id})">${p.name}</h3>
        <p>${p.description}</p>
        <div class="pret">${Number(p.price).toFixed(2)} RON</div>
        <button class="btn-cumpara" onclick="addToCart(${p.id})">Adaugă în coș</button>
        </div>
        `;
        });
        } catch (e) { document.getElementById('lista-produse').innerHTML = "Eroare la încărcare."; }
        }

        // DESCHIDEREA POP-UP-ULUI DESENAT DE TINE
        async function openProductModal(id) {
        const product = products.find(p => p.id === id);
        if (!product) return;
        activeModalProductId = id;

        document.getElementById('modal-img').src = product.image;
        document.getElementById('modal-nume').innerText = product.name;
        document.getElementById('modal-pret').innerText = Number(product.price).toFixed(2) + " RON";
        document.getElementById('modal-descriere').innerText = product.description;
        document.getElementById('modal-btn-adauga').onclick = () => { addToCart(id); };

        await refreshCommentsUI(id);
        document.getElementById('produs-modal').style.display = 'flex';
        }

        function closeProductModal() {
        document.getElementById('produs-modal').style.display = 'none';
        activeModalProductId = null;
        }

        // ÎNCĂRCAREA COMENTARIILOR DIN SERVER PENTRU POP-UP
        async function refreshCommentsUI(productId) {
        const container = document.getElementById('modal-lista-comentarii');
        container.innerHTML = "Se încarcă recenziile...";

        try {
        const response = await fetch(`${BACKEND_URL}/api/comentarii/${productId}`);
        const comments = await response.json();

        if (comments.length === 0) {
        container.innerHTML = `<p style="color: #6a6a8a; margin: 0;">Nicio recenzie momentan. Fii primul care adaugă una!</p>`;
        document.getElementById('modal-rating-mediu').innerText = "Fără rating";
        return;
        }

        container.innerHTML = "";
        let totalStars = 0;

        comments.forEach(c => {
        totalStars += c.rating;
        const stars = "⭐".repeat(c.rating);
        container.innerHTML += `
        <div class="comentariu-item">
        <span class="comentariu-user">${c.username}:</span>
        <span class="comentariu-stele">${stars}</span>
        <p style="margin: 5px 0 0 0; color: #d1d1e0;">${c.text}</p>
        </div>
        `;
        });

        const medie = (totalStars / comments.length).toFixed(1);
        document.getElementById('modal-rating-mediu').innerText = `⭐`.repeat(Math.round(medie)) + ` (${medie} / 5 din ${comments.length} voturi)`;
        } catch (e) {
        container.innerHTML = "Nu s-au putut încărca comentariile.";
        }
        }

        // TRIMITEREA UNUI COMENTARIU NOU PE SERVER (RAILWAY)
        async function submitNewComment() {
        if (!loggedInUser) {
        showNotification("Trebuie să fii conectat ca să lași un comentariu!", true);
        toggleUserMenu();
        return;
        }

        const text = document.getElementById('nou-comentariu-text').value.trim();
        const rating = document.getElementById('nou-comentariu-rating').value;

        if (!text) {
        showNotification("Scrie un text pentru comentariu!", true);
        return;
        }

        try {
        const response = await fetch(BACKEND_URL + '/api/comentarii', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
        productId: activeModalProductId,
        username: loggedInUser.username,
        rating: rating,
        text: text
        })
        });
        const result = await response.json();

        if (result.success) {
        showNotification(result.message);
        document.getElementById('nou-comentariu-text').value = "";
        await refreshCommentsUI(activeModalProductId);
        } else {
        showNotification(result.message, true);
        }
        } catch (e) {
        showNotification("Eroare la trimiterea comentariului.", true);
        }
        }

        function addToCart(id) {
        const product = products.find(p => p.id === id);
        if (product) { cart.push(product); updateCartUI(); showNotification("Produs adăugat în coș!"); }
        }
        function removeFromCart(index) { cart.splice(index, 1); updateCartUI(); }
        function updateCartUI() {
        document.getElementById('cos-contor').innerText = cart.length; const elementsContainer = document.getElementById('cos-elemente');
        if (cart.length === 0) { elementsContainer.innerHTML = '<p style="color: #6a6a8a; text-align: center;">Coșul este gol.</p>'; }
        else {
        elementsContainer.innerHTML = "";
        cart.forEach((p, idx) => { elementsContainer.innerHTML += `<div class="produs-cos"><div><strong>${p.name}</strong><br><span style="color: #2ecc71;">${Number(p.price).toFixed(2)} RON</span></div><button class="sterge-produs" onclick="removeFromCart(${idx})">X</button></div>`; });
        }
        const total = cart.reduce((sum, p) => sum + Number(p.price), 0); document.getElementById('cos-total-pret').innerText = total.toFixed(2) + " RON";
        }

        async function sendOrderToServer() {
        if (!loggedInUser) { showNotification("Conectează-te pentru a trimite comanda!", true); toggleUserMenu(); return; }
        if (cart.length === 0) { showNotification("Coșul este gol!", true); return; }
        const totalAmount = cart.reduce((sum, p) => sum + Number(p.price), 0);
        try {
        const response = await fetch(BACKEND_URL + '/api/comanda', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ products: cart, total: totalAmount, user: loggedInUser.username, address: loggedInUser.address }) });
        const result = await response.json();
        if (result.success) { showNotification(result.message); cart = []; updateCartUI(); toggleCart(); }
        else { showNotification(result.message, true); }
        } catch (error) { showNotification("Eroare la trimiterea comenzii.", true); }
        }

        window.addEventListener('DOMContentLoaded', () => { fetchProducts(); checkLoginState(); });
    </script>
</body>
</html>
