<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orion Shop</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #0f0f1a;
            margin: 0;
            padding: 0;
            color: #fff;
        }

        header {
            background: linear-gradient(135deg, #1e1e38 0%, #111125 100%);
            color: white;
            padding: 2.5rem;
            text-align: center;
            position: relative;
            border-bottom: 3px solid #3498db;
        }

        /* 📜 SCROLL BAR-UL CEL ȘMECHER (ALBASTRU) */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #111125;
        }

        ::-webkit-scrollbar-thumb {
            background: #00b4db;
            border-radius: 5px;
        }

            ::-webkit-scrollbar-thumb:hover {
                background: #0083b0;
            }

        /* 🛒 & 👤 BUTOANELE DIN ANTET */
        .antet-butoane {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            gap: 15px;
        }

        .cos-buton, .user-buton {
            background: linear-gradient(135deg, #00b4db 0%, #0083b0 100%);
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 4px 15px rgba(0, 180, 219, 0.4);
            font-size: 1rem;
            width: auto;
            transition: all 0.3s ease;
        }

            .cos-buton:hover, .user-buton:hover {
                transform: scale(1.05);
                box-shadow: 0 6px 20px rgba(0, 180, 219, 0.6);
            }

            .cos-buton:active, .user-buton:active {
                transform: scale(0.98);
            }

        .cos-contor {
            background: white;
            color: #0083b0;
            padding: 3px 10px;
            border-radius: 50%;
            font-size: 0.9rem;
            font-weight: 900;
        }

        /* 🗲 PANOURILE GLISANTE (COȘ & CONT) */
        .panou-lateral {
            position: fixed;
            top: 0;
            width: 340px;
            height: 100%;
            background: #16162a;
            box-shadow: 5px 0 25px rgba(0,0,0,0.5);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
            padding: 25px;
            display: flex;
            flex-direction: column;
        }

        #cos-panou {
            left: -400px;
            border-right: 2px solid #00b4db;
        }

            #cos-panou.deschis {
                left: 0;
            }

        #user-panou {
            right: -400px;
            border-left: 2px solid #00b4db;
        }

            #user-panou.deschis {
                right: 0;
            }

        .panou-antet {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #252542;
            padding-bottom: 15px;
            margin-bottom: 15px;
        }

        .inchide-panou {
            background: #ff4757;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            width: auto;
            font-weight: bold;
            transition: all 0.2s;
        }

            .inchide-panou:hover {
                background: #ff6b81;
                transform: scale(1.05);
            }

        /* 🔀 BUTOANE SCHIMBARE MOD (SIGN IN / SIGN UP) */
        .comutator-mod {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            background: #111125;
            padding: 5px;
            border-radius: 8px;
        }

            .comutator-mod button {
                flex: 1;
                background: transparent;
                color: #8a8aab;
                border: none;
                padding: 8px;
                cursor: pointer;
                font-weight: bold;
                border-radius: 6px;
                transition: all 0.2s;
            }

                .comutator-mod button.activ {
                    background: #00b4db;
                    color: white;
                }

        /* 🔐 FORMULARE EMAG STYLE */
        .formular-orion {
            background: #1e1e38;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            border: 1px solid #2d2d4f;
        }

            .formular-orion h3 {
                margin: 0 0 15px 0;
                font-size: 1.1rem;
                color: #00b4db;
                text-transform: uppercase;
            }

        .grup-input {
            margin-bottom: 12px;
            text-align: left;
        }

            .grup-input label {
                display: block;
                font-size: 0.8rem;
                color: #8a8aab;
                margin-bottom: 4px;
            }

            .grup-input input {
                width: 93%;
                background: #111125;
                border: 1px solid #2d2d4f;
                padding: 10px;
                border-radius: 8px;
                color: white;
                font-size: 0.9rem;
                transition: all 0.3s;
            }

                .grup-input input:focus {
                    outline: none;
                    border-color: #00b4db;
                    box-shadow: 0 0 8px rgba(0, 180, 219, 0.4);
                }

        .btn-actiune {
            background: linear-gradient(135deg, #00b4db 0%, #0083b0 100%);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            transition: all 0.2s;
        }

            .btn-actiune:hover {
                transform: translateY(-2px);
                box-shadow: 0 4px 12px rgba(0, 180, 219, 0.3);
            }

        .info-status-conectat {
            text-align: center;
            padding: 20px 10px;
            background: #1e1e38;
            border-radius: 12px;
            border: 1px solid #2d2d4f;
        }

        .btn-deconectare {
            background: #ff4757;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 15px;
            width: 100%;
        }

        /* 🔥 BUTONUL MARE: FINALIZEAZĂ COMANDA */
        .buton-plata-sus {
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.1rem;
            width: 100%;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(46, 204, 113, 0.4);
            transition: all 0.25s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 4px solid #1e7e43;
        }

            .buton-plata-sus:hover {
                background: linear-gradient(135deg, #2ed573 0%, #26af5f 100%);
                box-shadow: 0 8px 22px rgba(46, 204, 113, 0.6);
                transform: translateY(-2px);
            }

            .buton-plata-sus:active {
                transform: translateY(2px);
                border-bottom: 1px solid #1e7e43;
            }

        .cos-total {
            font-size: 1.3rem;
            font-weight: bold;
            padding: 10px 0;
            border-bottom: 2px solid #252542;
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            color: #2ecc71;
        }

        .cos-elemente {
            flex: 1;
            overflow-y: auto;
        }

        .produs-cos {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #252542;
            font-size: 0.95rem;
        }

        .sterge-produs {
            background: none;
            color: #ff4757;
            border: none;
            cursor: pointer;
            font-weight: bold;
            width: auto;
            font-size: 1.2rem;
            transition: transform 0.2s;
        }

            .sterge-produs:hover {
                transform: scale(1.2);
            }

        /* 🛍️ CATALOG PRODUSE */
        .container {
            max-width: 1200px;
            margin: 3rem auto;
            padding: 0 1rem;
        }

        .lista-produse {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 2.5rem;
        }

        .card {
            background: #1e1e38;
            padding: 1.8rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            justify-content: space-between;
            border: 1px solid #2d2d4f;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

            .card:hover {
                transform: translateY(-5px);
                border-color: #00b4db;
            }

        .produs-img {
            width: 100%;
            height: 200px;
            border-radius: 15px;
            object-fit: contain;
            margin-bottom: 1.2rem;
            background-color: #111125;
        }

        .card h3 {
            margin: 0.5rem 0;
            font-size: 1.3rem;
            color: #fff;
        }

        .card p {
            margin: 0 0 1.2rem 0;
            color: #8a8aab;
            font-size: 0.95rem;
        }

        .pret {
            font-size: 1.5rem;
            color: #00b4db;
            font-weight: bold;
            margin-bottom: 1.2rem;
        }

        .btn-cumpara {
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
            color: white;
            border: none;
            padding: 12px 0;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.05rem;
            width: 100%;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(52, 152, 219, 0.3);
            border-bottom: 3px solid #1f6594;
        }

            .btn-cumpara:hover {
                background: linear-gradient(135deg, #4aa3df 0%, #2e8ece 100%);
                box-shadow: 0 6px 18px rgba(52, 152, 219, 0.5);
                transform: translateY(-2px);
            }

        /* 🔔 NOTIFICAREA DE SITE */
        .notificare {
            position: fixed;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            color: white;
            padding: 16px 32px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1.1rem;
            box-shadow: 0 10px 25px rgba(46, 204, 113, 0.4);
            z-index: 2000;
            transition: top 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid #2ed573;
        }

            .notificare.afisat {
                top: 30px;
            }

            .notificare.eroare {
                background: linear-gradient(135deg, #ff4757 0%, #ee5253 100%);
                box-shadow: 0 10px 25px rgba(255, 71, 87, 0.4);
                border: 1px solid #ff6b81;
            }

        /* 📱 RESPONSIVE MOBIL */
        @media (max-width: 768px) {
            header {
                padding: 5rem 1rem 1.5rem 1rem;
            }

            .antet-butoane {
                position: fixed;
                top: 12px;
                left: 12px;
                transform: none;
                z-index: 999;
                gap: 8px;
                width: calc(100% - 24px);
                justify-content: space-between;
            }

            .cos-buton, .user-buton {
                padding: 8px 14px;
                font-size: 0.85rem;
            }

            .panou-lateral {
                width: 85%;
            }

            .lista-produse {
                gap: 1.5rem;
            }

            .produs-img {
                height: 160px;
            }
        }
    </style>
</head>
<body>

    <div id="zona-notificare" class="notificare">🚀 Acțiune reușită!</div>

    <header>
        <div class="antet-butoane">
            <button class="cos-buton" onclick="toggleCos()">
                🛒 Coș <span id="cos-contor" class="cos-contor">0</span>
            </button>
            <button class="user-buton" id="btn-meniu-user" onclick="toggleUserMeniu()">
                👤 Contul meu
            </button>
        </div>
        <h1>🛍️ Orion Shop</h1>
        <p style="color: #8a8aab; margin: 5px 0 0 0;">Magazinul Orion facut de Octavian</p>
    </header>

    <div id="cos-panou" class="panou-lateral">
        <div class="panou-antet">
            <h2>Coșul tău</h2>
            <button class="inchide-panou" onclick="toggleCos()">X</button>
        </div>

        <button class="buton-plata-sus" onclick="trimiteComandaLaServer()">Finalizează Comanda</button>

        <div class="cos-total">
            <span>Total:</span>
            <span id="cos-total-pret">0.00 RON</span>
        </div>

        <div id="cos-elemente" class="cos-elemente">
            <p style="color: #6a6a8a; text-align: center;">Coșul este gol.</p>
        </div>
    </div>

    <div id="user-panou" class="panou-lateral">
        <div class="panou-antet">
            <h2 id="user-titlu-panou">Autentificare</h2>
            <button class="inchide-panou" onclick="toggleUserMeniu()">X</button>
        </div>

        <div id="sectiune-vizitator">
            <div class="comutator-mod">
                <button id="btn-mod-login" class="activ" onclick="schimbaModUser('login')">Sign In</button>
                <button id="btn-mod-register" onclick="schimbaModUser('register')">Sign Up</button>
            </div>

            <div class="formular-orion">
                <div class="grup-input">
                    <label>Nume Utilizator / User</label>
                    <input type="text" id="auth-username" placeholder="Ex: Octavian363">
                </div>
                <div class="grup-input">
                    <label>Parolă / Password</label>
                    <input type="password" id="auth-password" placeholder="••••••••">
                </div>
                <div class="grup-input" id="grup-input-adresa" style="display: none;">
                    <label>Adresă Completă Livrare</label>
                    <input type="text" id="auth-adresa" placeholder="Oraș, Stradă, Număr">
                </div>

                <button class="btn-actiune" id="btn-auth-trimite" onclick="executaAutentificare()">Sign In</button>
            </div>
        </div>

        <div id="sectiune-conectat" style="display: none;">
            <div class="info-status-conectat">
                <h3 style="color: #2ecc71; margin-top: 0;">✓ Cont Conectat</h3>
                <p id="info-user-salut" style="font-size: 1.1rem; font-weight: bold;"></p>
                <p id="info-user-adresa" style="color: #8a8aab; font-size: 0.9rem;"></p>
                <button class="btn-deconectare" onclick="deconectareUtilizator()">Deconectare / Sign Out</button>
            </div>
        </div>
    </div>

    <div class="container">
        <div id="lista-produse" class="lista-produse">🔄 Se încarcă catalogul spatial...</div>
    </div>

    <script>
        let cos = [];
        let warmeProduse = [];
        let modCurentUser = 'login'; // 'login' sau 'register'
        let utilizatorLogat = null; // Stochează datele când userul e conectat

        function toggleCos() {
        document.getElementById('cos-panou').classList.toggle('deschis');
        document.getElementById('user-panou').classList.remove('deschis');
        }

        function toggleUserMeniu() {
        document.getElementById('user-panou').classList.toggle('deschis');
        document.getElementById('cos-panou').classList.remove('deschis');
        }

        function schimbaModUser(mod) {
        modCurentUser = mod;
        const btnLogin = document.getElementById('btn-mod-login');
        const btnRegister = document.getElementById('btn-mod-register');
        const grupAdresa = document.getElementById('grup-input-adresa');
        const btnTrimite = document.getElementById('btn-auth-trimite');

        if (mod === 'login') {
        btnLogin.classList.add('activ');
        btnRegister.classList.remove('activ');
        grupAdresa.style.display = 'none';
        btnTrimite.innerText = 'Sign In';
        } else {
        btnRegister.classList.add('activ');
        btnLogin.classList.remove('activ');
        grupAdresa.style.display = 'block';
        btnTrimite.innerText = 'Sign Up (Creare Cont)';
        }
        }

        function arataNotificare(mesaj, esteEroare = false) {
        const el = document.getElementById('zona-notificare');
        el.innerText = mesaj;
        if (esteEroare) el.classList.add('eroare'); else el.classList.remove('eroare');
        el.classList.add('afisat');
        setTimeout(() => { el.classList.remove('afisat'); }, 4000);
        }

        // Verifică starea conectării la pornirea paginii
        function verificaStareConectare() {
        const stocat = localStorage.getItem('orion_user_session');
        if (stocat) {
        utilizatorLogat = JSON.parse(stocat);
        actualizeazaInterfataUtilizator();
        }
        }

        function actualizeazaInterfataUtilizator() {
        const secVizitator = document.getElementById('sectiune-vizitator');
        const secConectat = document.getElementById('sectiune-conectat');
        const btnMeniu = document.getElementById('btn-meniu-user');

        if (utilizatorLogat) {
        secVizitator.style.display = 'none';
        secConectat.style.display = 'block';
        btnMeniu.innerText = `👤 ${utilizatorLogat.username}`;
        document.getElementById('info-user-salut').innerText = `Salut, ${utilizatorLogat.username}!`;
        document.getElementById('info-user-adresa').innerText = `Adresă: ${utilizatorLogat.adresa}`;
        } else {
        secVizitator.style.display = 'block';
        secConectat.style.display = 'none';
        btnMeniu.innerText = '👤 Contul meu';
        }
        }

        async function executaAutentificare() {
        const username = document.getElementById('auth-username').value.trim();
        const password = document.getElementById('auth-password').value.trim();
        const adresa = document.getElementById('auth-adresa').value.trim();

        if (!username || !password) {
        arataNotificare("⚠️ Introdu numele de utilizator și parola!", true);
        return;
        }

        if (modCurentUser === 'register' && !adresa) {
        arataNotificare("⚠️ Te rugăm să adaugi o adresă de livrare!", true);
        return;
        }

        const ruta = modCurentUser === 'login' ? '/api/login' : '/api/register';
        const dateTrise = modCurentUser === 'login' ? { username, password } : { username, password, adresa };

        try {
        const raspuns = await fetch(ruta, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(dateTrise)
        });
        const date = await raspuns.json();

        if (date.succes) {
        arataNotificare("🚀 " + date.mesaj);
        if (modCurentUser === 'login') {
        utilizatorLogat = date.user;
        localStorage.setItem('orion_user_session', JSON.stringify(date.user));
        actualizeazaInterfataUtilizator();
        toggleUserMeniu();
        } else {
        schimbaModUser('login');
        }
        // Resetăm câmpurile
        document.getElementById('auth-username').value = "";
        document.getElementById('auth-password').value = "";
        document.getElementById('auth-adresa').value = "";
        } else {
        arataNotificare("❌ " + date.mesaj, true);
        }
        } catch (e) {
        arataNotificare("❌ Problemă de conexiune cu serverul.", true);
        }
        }

        function deconectareUtilizator() {
        utilizatorLogat = null;
        localStorage.removeItem('orion_user_session');
        actualizeazaInterfataUtilizator();
        arataNotificare("Te-ai deconectat cu succes!");
        }

        async function aduProdusele() {
        try {
        const raspuns = await fetch("/api/produse");
        warmeProduse = await raspuns.json();
        const container = document.getElementById('lista-produse');
        container.innerHTML = "";

        warmeProduse.forEach(p => {
        container.innerHTML += `
        <div class="card">
        <img src="${p.imagine}" class="produs-img" alt="${p.nume}">
        <h3>${p.nume}</h3>
        <p>${p.descriere}</p>
        <div class="pret">${p.pret.toFixed(2)} RON</div>
        <button class="btn-cumpara" onclick="adaugaInCos(${p.id})">Adaugă în coș</button>
        </div>
        `;
        });
        } catch (e) {
        document.getElementById('lista-produse').innerHTML = "❌ Eroare la incarcarea produselor.";
        }
        }

        function adaugaInCos(id) {
        const produs = warmeProduse.find(p => p.id === id);
        if (produs) {
        cos.push(produs);
        actualizeazaGraficCos();
        }
        }

        function stergeDinCos(index) {
        cos.splice(index, 1);
        actualizeazaGraficCos();
        }

        function actualizeazaGraficCos() {
        document.getElementById('cos-contor').innerText = cos.length;
        const containerElemente = document.getElementById('cos-elemente');

        if (cos.length === 0) {
        containerElemente.innerHTML = '<p style="color: #6a6a8a; text-align: center;">Coșul este gol.</p>';
        } else {
        containerElemente.innerHTML = "";
        cos.forEach((p, index) => {
        containerElemente.innerHTML += `
        <div class="produs-cos">
        <div>
        <strong>${p.nume}</strong><br>
        <span style="color: #2ecc71;">${p.pret.toFixed(2)} RON</span>
        </div>
        <button class="sterge-produs" onclick="stergeDinCos(${index})">🗑️</button>
        </div>
        `;
        });
        }

        const total = cos.reduce((suma, p) => suma + p.pret, 0);
        document.getElementById('cos-total-pret').innerText = total.toFixed(2) + " RON";
        }

        async function trimiteComandaLaServer() {
        if (!utilizatorLogat) {
        arataNotificare("⚠️ Trebuie să te conectezi (Sign In) pentru a trimite comanda!", true);
        toggleUserMeniu();
        return;
        }

        if (cos.length === 0) {
        arataNotificare("⚠️ Adaugă produse în coș mai întâi!", true);
        return;
        }

        const totalPret = cos.reduce((suma, p) => suma + p.pret, 0);

        try {
        const response = await fetch('/api/comanda', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
        produse: cos,
        total: totalPret,
        utilizator: utilizatorLogat.username,
        adresa: utilizatorLogat.adresa
        })
        });

        const rezultat = await response.json();

        if(rezultat.succes) {
        arataNotificare("🚀 " + rezultat.mesaj, false);
        cos = [];
        actualizeazaGraficCos();
        toggleCos();
        } else {
        arataNotificare("❌ " + rezultat.mesaj, true);
        }

        } catch (error) {
        arataNotificare("❌ Serverul nu a răspuns la comandă.", true);
        }
        }

        window.addEventListener('DOMContentLoaded', () => {
        aduProdusele();
        verificaStareConectare();
        });
    </script>
</body>
</html>
